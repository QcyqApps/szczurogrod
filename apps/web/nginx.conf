# Wewnętrzny nginx kontenera grodno-web. Słucha na :80 (port nieekspozycji
# na hosta — front nginx w shared-proxy proxy_pass'uje tutaj). SPA fallback:
# każde nieznane route'owanie idzie do index.html, żeby React Router (gdyby
# kiedyś doszedł) i deep-linki działały.
#
# UWAGA: ten plik kopiowany jest do /etc/nginx/conf.d/, więc nie wnosi
# bloków `events {}` ani `http {}` — te są w nginx:alpine default base
# config'u (`/etc/nginx/nginx.conf`).

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bezpieczne nagłówki (front nginx też je nakłada, ale defense-in-depth).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Statyki Vite (assety chunked z hashem w nazwie) — agresywny cache.
    # immutable znaczy „nie pytaj nawet z If-Modified-Since" — hash w nazwie
    # sam wymusza invalidation przy nowym buildzie.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PNG/SVG/ICO z public/ — średni cache (ikony zmieniają się rzadziej niż
    # JS, ale nie mają hash'a w nazwie więc nie immutable).
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — index.html dla wszystkiego co nie jest plikiem.
    # index.html samo MUSI być no-cache, inaczej deploy nowej wersji nie
    # docierałby do użytkowników z otwartą zakładką.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Healthcheck żeby docker healthcheck mógł sprawdzić czy nginx żyje.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
