services:
  postgres:
    image: postgres:16-alpine
    container_name: grodno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grodno
      POSTGRES_PASSWORD: grodno
      POSTGRES_DB: grodno
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grodno -d grodno"]
      interval: 5s
      timeout: 5s
      retries: 10

