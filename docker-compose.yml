services:
  postgres:
    image: postgres:16-alpine
    container_name: grodno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grodno
      POSTGRES_PASSWORD: grodno
      POSTGRES_DB: grodno
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      # Postgres SIEDZI WYŁĄCZNIE w internal — proxy nie ma do niego dostępu.
      # Server'owi pozwalamy mówić do bazy bo on też jest w `internal`.
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grodno -d grodno"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    # Profil "app" oddziela tryb pełnej produkcji (server+db) od `pnpm db:up`
    # (tylko Postgres pod lokalny dev przez `pnpm dev:server`).
    # Start: `docker compose --profile app up -d`
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: grodno-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      # Wewnątrz docker network host = nazwa serwisu, port = wewnętrzny 5432
      # (nie zmapowany 5434).
      DATABASE_URL: postgres://grodno:grodno@postgres:5432/grodno
      # Reszta env'ów — z pliku .env w root'cie repo (docker-compose czyta go
      # automatycznie). `:?` = required, `:-x` = default.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET wymagane (32+ znaków)}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN wymagane}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      # `internal` — komunikacja z postgresem.
      # `shared-proxy` — wystawienie pod nginx'a który siedzi w tej samej sieci.
      #   nginx upstreama wskaż na `grodno-server:4000` (container_name + port).
      - internal
      - shared-proxy
    # Brak `ports:` — port 4000 NIE jest publikowany na hostowym interfejsie.
    # Cały zewnętrzny ruch musi iść przez nginx'a w `shared-proxy`. Lokalny
    # debug: `docker exec -it grodno-server wget -qO- localhost:4000/healthz`,
    # albo dodaj tymczasowo `ports: ["127.0.0.1:4000:4000"]` na czas testów.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/healthz').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    # Statyczny SPA build (Vite → nginx alpine) serwowany pod ratburg.com /
    # szczurogrod.pl przez front nginx'a w shared-proxy. Backend zostaje na
    # tidle.ovh — VITE_API_URL bake'owany w bundle pod build.
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Override przez `VITE_API_URL=https://staging.tidle.ovh/grodno docker
        # compose --profile app build web` jeśli inny env. Default to prod.
        VITE_API_URL: ${VITE_API_URL:-https://tidle.ovh/grodno}
    container_name: grodno-web
    restart: unless-stopped
    networks:
      # Tylko shared-proxy — web nie potrzebuje dostępu do bazy.
      - shared-proxy
    # Brak `ports:` — front nginx proxy_pass'uje na grodno-web:80.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  survivor:
    # Drugi front bundle: Szczurogród: Okruchy. Side-view survival rougelike,
    # osobny appId na Capacitorze, osobna domena (`survivor.ratburg.com`).
    # Backend współdzielony z `server` (jeden Fastify obsługuje oba routery).
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/survivor/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://tidle.ovh/grodno}
    container_name: grodno-survivor
    restart: unless-stopped
    networks:
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    # `name:` wymusza dokładną nazwę volume'u, bez auto-prefixu compose project
    # name (`<dir>_postgres_data`). Powód: na serwerze produkcyjnym chodzi
    # inny postgres który używa generic `postgres_data` — kolizja by przykryła
    # tamte dane (postgres init w nowym kontenerze widzi niepustą bazę i
    # crashuje, albo gorzej — nadpisuje rolami z tego compose'a).
    name: grodno_pg_data

networks:
  # Sieć wewnętrzna tego compose'a (server ↔ postgres). Default driver bridge.
  internal:

  # `shared-proxy` istnieje już na serwerze (utworzona przez compose'a nginx'a).
  # `external: true` znaczy: nie twórz, tylko podepnij się. Lokalnie żeby ten
  # plik nie sypał błędem zanim sieć powstanie:
  #   docker network create shared-proxy
  shared-proxy:
    external: true
